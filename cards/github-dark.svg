<svg
    width="600"
    height="300"
    viewBox="0 0 600 300"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink">

    <defs>
        <clipPath id="profileClip">
            <circle cx="555" cy="43" r="27" />
        </clipPath>

        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#39d353">
                <animate attributeName="stop-color" values="#39d353;#58a6ff;#39d353" dur="6s" repeatCount="indefinite" />
            </stop>
            <stop offset="50%" stop-color="#30363d" />
            <stop offset="100%" stop-color="#39d353">
                <animate attributeName="stop-color" values="#39d353;#f778ba;#39d353" dur="6s" repeatCount="indefinite" />
            </stop>
        </linearGradient>
    </defs>

    <!-- ======================== -->
    <!-- CARD BACKGROUND -->
    <!-- ======================== -->

    <rect
        x="1"
        y="1"
        width="598"
        height="298"
        rx="16"
        fill="#0d1117"
        stroke="url(#borderGrad)"
        stroke-width="1.4"
    />


    <!-- ======================== -->
    <!-- HEADER -->
    <!-- ======================== -->

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.5s" fill="freeze" />
        <text
            x="25"
            y="40"
            fill="#ffffff"
            font-size="20"
            font-weight="bold">
            {{NAME}}
        </text>
    </g>

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.35s" dur="0.5s" fill="freeze" />
        <text
            x="25"
            y="65"
            fill="#39d353"
            font-size="13">
            @{{USERNAME}}
        </text>
    </g>

    <!-- Profile Picture - Top Right Corner -->
    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.6s" fill="freeze" />
        <image
            href="{{PROFILE_PICTURE}}"
            xlink:href="{{PROFILE_PICTURE}}"
            x="528"
            y="16"
            width="54"
            height="54"
            preserveAspectRatio="xMidYMid slice"
            clip-path="url(#profileClip)"
        />

        <!-- Profile Picture Border -->
        <circle
            cx="555"
            cy="43"
            r="27"
            fill="none"
            stroke="#39d353"
            stroke-width="2"
        >
            <animate attributeName="stroke-width" values="2;3;2" dur="2.4s" repeatCount="indefinite" />
            <animate attributeName="stroke-opacity" values="1;0.6;1" dur="2.4s" repeatCount="indefinite" />
        </circle>
    </g>


    <!-- ======================== -->
    <!-- HORIZONTAL DIVIDER -->
    <!-- ======================== -->

    <line
        x1="25"
        y1="85"
        x2="25"
        y2="85"
        stroke="#30363d"
        stroke-width="1"
    >
        <animate attributeName="x2" from="25" to="575" begin="0.5s" dur="0.6s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1" />
    </line>


    <!-- ======================== -->
    <!-- VERTICAL DIVIDER 1 -->
    <!-- ======================== -->

    <line
        x1="200"
        y1="105"
        x2="200"
        y2="105"
        stroke="#30363d"
        stroke-width="1"
    >
        <animate attributeName="y2" from="105" to="275" begin="1.1s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1" />
    </line>


    <!-- ======================== -->
    <!-- VERTICAL DIVIDER 2 -->
    <!-- ======================== -->

    <line
        x1="400"
        y1="105"
        x2="400"
        y2="105"
        stroke="#30363d"
        stroke-width="1"
    >
        <animate attributeName="y2" from="105" to="275" begin="1.1s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1" />
    </line>


    <!-- ======================== -->
    <!-- LEFT CONTAINER -->
    <!-- GitHub Stats -->
    <!-- ======================== -->

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.4s" fill="freeze" />

        <text x="40" y="125" fill="#8b949e" font-size="11">
            TOTAL REPOS
        </text>
        <text x="160" y="125" fill="#39d353" font-size="14" font-weight="bold" filter="url(#glow)">
            {{TOTAL_REPOS}}
        </text>
    </g>

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.65s" dur="0.4s" fill="freeze" />

        <text x="40" y="160" fill="#8b949e" font-size="11">
            FOLLOWERS
        </text>
        <text x="160" y="160" fill="#39d353" font-size="14" font-weight="bold" filter="url(#glow)">
            {{FOLLOWERS}}
        </text>
    </g>

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.4s" fill="freeze" />

        <text x="40" y="195" fill="#8b949e" font-size="11">
            COMMITS
        </text>
        <text x="160" y="195" fill="#39d353" font-size="14" font-weight="bold" filter="url(#glow)">
            {{COMMITS}}
        </text>
    </g>

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.95s" dur="0.4s" fill="freeze" />

        <text x="40" y="230" fill="#8b949e" font-size="11">
            STARS
        </text>
        <text x="160" y="230" fill="#39d353" font-size="14" font-weight="bold" filter="url(#glow)">
            {{STARS}}
        </text>
    </g>


    <!-- ======================== -->
    <!-- CENTER CONTAINER -->
    <!-- Streak Stats -->
    <!-- ======================== -->

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.4s" fill="freeze" />

        <text
            x="300"
            y="125"
            fill="#f78166"
            font-size="18"
            text-anchor="middle">
            🔥
        </text>

        <text
            x="300"
            y="148"
            fill="#8b949e"
            font-size="10"
            font-weight="bold"
            text-anchor="middle">
            CURRENT STREAK
        </text>

        <text
            x="300"
            y="172"
            fill="#ffffff"
            font-size="18"
            font-weight="bold"
            text-anchor="middle">
            {{CURRENT_STREAK}} days
        </text>
    </g>

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="2.3s" dur="0.4s" fill="freeze" />

        <text
            x="300"
            y="215"
            fill="#f1e05a"
            font-size="18"
            text-anchor="middle">
            ⚡
            <animate attributeName="opacity" values="1;0.4;1" dur="1.3s" repeatCount="indefinite" />
        </text>

        <text
            x="300"
            y="238"
            fill="#8b949e"
            font-size="10"
            font-weight="bold"
            text-anchor="middle">
            MAX STREAK
        </text>

        <text
            x="300"
            y="262"
            fill="#ffffff"
            font-size="18"
            font-weight="bold"
            text-anchor="middle">
            {{MAX_STREAK}} days
        </text>
    </g>


    <!-- ======================== -->
    <!-- RIGHT CONTAINER -->
    <!-- Social Links -->
    <!-- ======================== -->

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.4s" fill="freeze" />
        <text
            x="500"
            y="125"
            fill="#8b949e"
            font-size="11"
            font-weight="bold"
            text-anchor="middle">
            CONNECT
        </text>
    </g>

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="2.65s" dur="0.35s" fill="freeze" />
        <text
            x="500"
            y="160"
            fill="#ffffff"
            font-size="13"
            text-anchor="middle">
            GitHub
        </text>
    </g>

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.35s" fill="freeze" />
        <text
            x="500"
            y="190"
            fill="#58a6ff"
            font-size="13"
            text-anchor="middle">
            LinkedIn
        </text>
    </g>

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="2.95s" dur="0.35s" fill="freeze" />
        <text
            x="500"
            y="220"
            fill="#f778ba"
            font-size="13"
            text-anchor="middle">
            Instagram
        </text>
    </g>

    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.35s" fill="freeze" />
        <text
            x="500"
            y="250"
            fill="#39d353"
            font-size="13"
            text-anchor="middle">
            Website
        </text>
    </g>

</svg>