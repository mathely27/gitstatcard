<svg
    width="600"
    height="300"
    viewBox="0 0 600 300"
    xmlns="http://www.w3.org/2000/svg">

    <!-- ======================== -->
    <!-- CARD BACKGROUND -->
    <!-- ======================== -->

    <rect
        x="1"
        y="1"
        width="598"
        height="298"
        rx="16"
        fill="#0d1117"
        stroke="#30363d"
    />


    <!-- ======================== -->
    <!-- HEADER -->
    <!-- ======================== -->

    <text
        x="25"
        y="40"
        fill="#ffffff"
        font-size="20"
        font-weight="bold">
        Roshanpreet Singh
    </text>

    <text
        x="25"
        y="65"
        fill="#39d353"
        font-size="13">
        @roshandhiman
    </text>


    <!-- ======================== -->
    <!-- HORIZONTAL DIVIDER -->
    <!-- ======================== -->

    <line
        x1="25"
        y1="85"
        x2="575"
        y2="85"
        stroke="#30363d"
        stroke-width="1"
    />


    <!-- ======================== -->
    <!-- VERTICAL DIVIDER 1 -->
    <!-- ======================== -->

    <line
        x1="200"
        y1="105"
        x2="200"
        y2="275"
        stroke="#30363d"
        stroke-width="1"
    />


    <!-- ======================== -->
    <!-- VERTICAL DIVIDER 2 -->
    <!-- ======================== -->

    <line
        x1="400"
        y1="105"
        x2="400"
        y2="275"
        stroke="#30363d"
        stroke-width="1"
    />


    <!-- ======================== -->
    <!-- LEFT CONTAINER -->
    <!-- GitHub Stats -->
    <!-- ======================== -->

    <text x="40" y="125" fill="#8b949e" font-size="11">
        TOTAL REPOS
    </text>

    <text x="160" y="125" fill="#39d353" font-size="14" font-weight="bold">
        24
    </text>


    <text x="40" y="160" fill="#8b949e" font-size="11">
        FOLLOWERS
    </text>

    <text x="160" y="160" fill="#39d353" font-size="14" font-weight="bold">
        89
    </text>


    <text x="40" y="195" fill="#8b949e" font-size="11">
        COMMITS
    </text>

    <text x="160" y="195" fill="#39d353" font-size="14" font-weight="bold">
        567
    </text>


    <text x="40" y="230" fill="#8b949e" font-size="11">
        STARS
    </text>

    <text x="160" y="230" fill="#39d353" font-size="14" font-weight="bold">
        120
    </text>


    <!-- ======================== -->
    <!-- CENTER CONTAINER -->
    <!-- Streak Stats -->
    <!-- ======================== -->

    <text
        x="300"
        y="125"
        fill="#f78166"
        font-size="18"
        text-anchor="middle">
        🔥
    </text>

    <text
        x="300"
        y="148"
        fill="#8b949e"
        font-size="10"
        font-weight="bold"
        text-anchor="middle">
        CURRENT STREAK
    </text>

    <text
        x="300"
        y="172"
        fill="#ffffff"
        font-size="18"
        font-weight="bold"
        text-anchor="middle">
        12 days
    </text>


    <text
        x="300"
        y="215"
        fill="#f1e05a"
        font-size="18"
        text-anchor="middle">
        ⚡
    </text>

    <text
        x="300"
        y="238"
        fill="#8b949e"
        font-size="10"
        font-weight="bold"
        text-anchor="middle">
        MAX STREAK
    </text>

    <text
        x="300"
        y="262"
        fill="#ffffff"
        font-size="18"
        font-weight="bold"
        text-anchor="middle">
        47 days
    </text>


    <!-- ======================== -->
    <!-- RIGHT CONTAINER -->
    <!-- Social Links -->
    <!-- ======================== -->

    <text
        x="500"
        y="125"
        fill="#8b949e"
        font-size="11"
        font-weight="bold"
        text-anchor="middle">
        CONNECT
    </text>

    <text
        x="500"
        y="160"
        fill="#ffffff"
        font-size="13"
        text-anchor="middle">
        GitHub
    </text>

    <text
        x="500"
        y="190"
        fill="#58a6ff"
        font-size="13"
        text-anchor="middle">
        LinkedIn
    </text>

    <text
        x="500"
        y="220"
        fill="#f778ba"
        font-size="13"
        text-anchor="middle">
        Instagram
    </text>

    <text
        x="500"
        y="250"
        fill="#39d353"
        font-size="13"
        text-anchor="middle">
        Website
    </text>

</svg>